name: Build and Update Manifest Repo

on:
  push:
    branches: [ "prod" ]

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "${GITHUB_SHA::7}"

      # ---- Checkout manifest repo ----
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: HarshPanchal18/timoni-sample-app
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifests
          persist-credentials: false

      - name: Set SHA to image digest
        run: |
          cd manifests
          sed -i "s|^\(\s*digest:\s*\).*|\1\"$TAG\"|" image.cue
          echo "After update:"
          cat image.cue

      - name: Commit and push changes
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "chore: update nginx image to ${{ steps.vars.outputs.TAG }}" || echo "no changes to commit"

          # Ensure push uses the PAT provided in the secret
          git remote set-url origin https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/HarshPanchal18/timoni-sample-app.git
          git push origin HEAD:${{ github.ref_name }}
